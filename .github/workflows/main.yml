name: Market Report

on:
  workflow_dispatch:

  schedule:
    # 15:30 UTC = 8:30 AM California (PDT)
    - cron: "30 19 * * *"

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Show files
        run: |
          pwd
          ls -lah

      - name: Install dependencies
        run: |
          python -V
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run report
        run: |
          python -u coin_stock_report_d_github_20260716_001.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Add generated files if they exist
          [ -f market_data_dreport.xlsx ] && git add market_data_dreport.xlsx
          [ -f dATH_table.csv ] && git add dATH_table.csv

          # Commit only if something changed
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Automatic market update"
            git push
          fi
